#云端配置
server:
  port: ${PORT:8080}
spring:
  application:
    name: hotely5d
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    # 这里的 URL 必须换成你 Railway 数据库的地址！
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/hotely5d?characterEncoding=utf8&serverTimezone=GMT&useSSL=false}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:123456}
    type: com.zaxxer.hikari.HikariDataSource

# ... (jackson 和 mybatis-plus 部分保持不变)

upload:
  sufix: .jpg,.png,.gif,.jpeg
  maxsize: 10240
  # 修改为相对路径，适配云端环境
  path: file:./images/
  realPath: ./images/
  staticAccessPath: /images/**
  # 这里建议直接让前端拼接，或者使用动态域名
  urlPrefix: /images/